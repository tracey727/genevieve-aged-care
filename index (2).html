,ratio:5,capacity:14},{id:"high",name:"High Care",band:"Complex · Palliative",ratio:4,capacity:12},{id:"assisted",name:"Assisted Living",band:"Supported",ratio:9,capacity:18},{id:"respite",name:"Respite",band:"Short-stay",ratio:6,capacity:6}],ge={thin:{label:"Regular · thin fluids",severity:"Standard",sev:1,alert:!1,plan:"No texture modification. Normal diet and drinks.",avoid:["Nothing restricted"],avoidActivity:["No restriction"],swaps:["Standard menu"]},soft6:{label:"Soft & bite-sized (IDDSI 6)",severity:"Moderate",sev:2,alert:!0,plan:"Food soft, moist, bite-sized (≤1.5cm). Cut up; supervise pace.",avoid:["Hard, crunchy or stringy foods","Skins, pips, crusty bread","Mixed thin-liquid + solid (e.g. cereal in milk)"],avoidActivity:["Cooking sessions with hard tasting items","Hard lollies as activity rewards"],swaps:["Slow-cooked, moist proteins","Soft fruit without skin","Mashable veg"]},minced5:{label:"Minced & moist (IDDSI 5)",severity:"High",sev:3,alert:!0,plan:"Minced (≤4mm), moist, easily mashed with a fork. Upright 90° for meals; supervise.",avoid:["Any whole or bite-sized pieces","Dry, crumbly textures","Loose hard bits (rice, peas, corn)"],avoidActivity:["Tasting plates with mixed textures","Self-serve finger food"],swaps:["Minced moist mains with gravy","Smooth mashed sides","Thickened sauces to bind"]},puree4:{label:"Pureed (IDDSI 4)",severity:"High",sev:3,alert:!0,plan:"Smooth pureed, no lumps. Upright 90°, 1:1 supervision, slow pace. Thickened fluids as charted.",avoid:["Any lumps or pieces","Standard thin drinks (use thickener)","Bread, crackers, raw veg"],avoidActivity:["Group baking with sampling","Unsupervised drinks station"],swaps:["Smooth purees moulded for appeal","Pre-thickened drinks","Smooth dessert (no seeds)"]}},Nt=[{id:"r1",name:"Joan A.",wing:"memory",age:"84",room:"M-04",diet:"minced5",falls:3,mobility:"1-assist",signIn:"Resident",alerts:["Dementia","High falls risk"],meds:["PRN sedation (agitation) · RN review only","Memantine 10mg · morning","Paracetamol 1g · PRN"],background:"Retired primary-school teacher from Toowoomba. Widowed; two daughters, Karen is EPOA. In care 3 years.",likes:"1950s music settles her in seconds. Loves sorting buttons and folding tea towels, a milky tea mid-morning, and sitting by the window.",canEat:["Minced & moist casseroles with plenty of gravy","Mashed potato, pumpkin & soft veg","Soft scrambled egg","Smooth yoghurt & stewed apple","Thickened milky tea (level as charted)"],condDetail:{Dementia:'Moderate–advanced Alzheimer-type dementia. Recognises family less in the afternoons ("sundowning") and can become agitated around 4pm. Use short, one-step cues; approach from the front; familiar music calms her quickly. Avoid arguing — redirect gently.',"High falls risk":"Three falls in the last 6 months, the last from standing unaided overnight. Sensor mat by the bed + hourly night checks. Always 1-assist to mobilise, non-slip socks on, walk frame within reach. Encourage toileting before rest."},contacts:["Karen A. · Daughter / EPOA (primary) · 0412 330 771","Dr Lee · GP, Southport Medical · 07 5573 1100"],notes:["Responds beautifully to 1950s music. Sensor mat + hourly checks overnight."]},{id:"r2",name:"Bill T.",wing:"memory",age:"79",room:"M-09",diet:"thin",falls:2,mobility:"Walking stick",signIn:"Resident",alerts:["Dementia","Falls risk"],meds:["Aspirin 100mg · daily","Vitamin D · daily","Perindopril 4mg · morning (BP)"],background:"Born and bred Gold Coast; worked 40 years as a carpenter. Married to Sue for 54 years — she visits most afternoons. Two sons interstate.",likes:"The garden loop after breakfast, the smell of cut grass, and the footy on Saturday (lifelong Broncos man). Likes his routine, his cap and his watch — they orient him. Loves a roast dinner and tea with two sugars.",canEat:["Full regular diet — no texture changes","Roast dinners (his favourite)","Sandwiches, toast & fresh fruit","Tea, two sugars","A shandy on special occasions (with family/GP okay)"],condDetail:{Dementia:"Early–moderate vascular dementia. Long-term memory is strong; he repeats recent questions and likes to tell carpentry stories — let him. Orientates well with his cap, watch and garden routine. Becomes anxious when the routine changes or he can't find Sue — reassure him she's coming and redirect to the garden.","Falls risk":"Steady with his stick on flat, dry ground but unsteady on grass and when tired. Supervise the garden loop, encourage a rest halfway, and keep paths clear. No falls in 4 months with this plan."},contacts:["Sue T. · Wife (primary contact) · 0419 552 030","Dr Raymond · GP, Labrador Family Practice · 07 5529 4400","Next of kin: son David · 0407 118 226"],notes:["Enjoys the supervised garden loop after breakfast. Reassurance about Sue settles him."]},{id:"r3",name:"Margaret R.",wing:"high",age:"88",room:"H-02",diet:"puree4",falls:3,mobility:"2-assist / hoist",signIn:"Resident",alerts:["Palliative","Aspiration risk"],meds:["Syringe driver · per chart · 4-hrly RN check","PRN analgesia (comfort) · RN","Mouth-care gel · 2-hrly"],background:"A registered nurse herself for 38 years. Strong Catholic faith. Son Peter is EPOA; the palliative team is involved. Comfort-focused care, family fully aware.",likes:"Quiet and dim light, hymns played softly, hand-holding, and lavender hand cream. Settles with a familiar voice and gentle company.",canEat:["Smooth pureed meals (IDDSI 4), moulded to look like real food","Pre-thickened drinks (level 150 as charted)","Smooth custard, mousse & jelly","Small comfort tastes — never rushed, always upright"],condDetail:{Palliative:"On a comfort-care pathway with the community palliative team. The goal is dignity and symptom relief, not active treatment. Keep her comfortable, mouth moist, repositioned gently, and involve family in decisions. Call the RN for any distress.","Aspiration risk":"High risk of food/fluid entering the lungs. She MUST be upright at 90° for any intake, fed slowly with 1:1 supervision, and only the charted thickened fluids. Mouth care 2-hourly. Stop and call the RN if she coughs, gurgles or tires."},contacts:["Peter R. · Son / EPOA (primary) · 0423 551 884","Community Palliative Team · 07 5573 2200","Dr Lee · GP · 07 5573 1100"],notes:["Comfort focus, family aware. Mouth care 2-hrly. Upright for any intake."]},{id:"r4",name:"Frank D.",wing:"high",age:"82",room:"H-07",diet:"soft6",falls:2,mobility:"Wheelchair",signIn:"Resident",alerts:["Diabetic","Wound care"],meds:["Insulin (sliding scale) · BSL before meals","Metformin 500mg · with meals","Dressing pack · heel wound"],background:"Ex-interstate truck driver, big personality, loves a yarn. Daughter Mary visits every Sunday with the grandkids. Fiercely independent — let him do what he safely can.",likes:"Sport on the telly, a good chat, and a (soft) meat pie. Likes to wheel himself to the window. Doesn't like being fussed over.",canEat:["Soft & bite-sized (IDDSI 6), cut ≤1.5cm","Tender slow-cooked meat in gravy","Soft cooked vegetables","Soft fruit without skin","Diabetic-friendly soft desserts — watch the sugar"],condDetail:{Diabetic:"Type 2, insulin-managed. Check blood sugar (BSL) before each meal and give insulin on the sliding scale as charted. Watch for hypo signs — shaky, sweaty, confused, pale: give fast sugar and call the RN. Watch for hyper signs — very thirsty, drowsy, frequent urine.","Wound care":"Pressure/skin wound on the right heel. Dressing changed alternate days by the RN. Keep the heel offloaded (pillow under calf, heel floating). Report any odour, increasing redness, swelling or new pain — possible infection."},contacts:["Mary D. · Daughter (primary) · 0412 660 200","Dr Okafor · GP, Benowa · 07 5564 7788"],notes:["BSL before meals. Heel wound dressing alternate days, heel offloaded."]},{id:"r5",name:"Dorothy K.",wing:"assisted",age:"76",room:"A-11",diet:"thin",falls:1,mobility:"Independent",signIn:"Resident",alerts:[],meds:["Cholesterol tablet · evening","Eye drops · twice daily"]
