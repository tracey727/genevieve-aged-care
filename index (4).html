ondDetail:{Dementia:"Early–moderate vascular dementia. Long-term memory is strong; he repeats recent questions and likes to tell carpentry stories — let him. Orientates well with his cap, watch and garden routine. Becomes anxious when the routine changes or he can't find Sue — reassure him she's coming and redirect to the garden.","Falls risk":"Steady with his stick on flat, dry ground but unsteady on grass and when tired. Supervise the garden loop, encourage a rest halfway, and keep paths clear. No falls in 4 months with this plan."},contacts:["Sue T. · Wife (primary contact) · 0419 552 030","Dr Raymond · GP, Labrador Family Practice · 07 5529 4400","Next of kin: son David · 0407 118 226"],notes:["Enjoys the supervised garden loop after breakfast. Reassurance about Sue settles him."]},{id:"r3",name:"Margaret R.",wing:"high",age:"88",room:"H-02",diet:"puree4",falls:3,mobility:"2-assist / hoist",signIn:"Resident",alerts:["Palliative","Aspiration risk"],meds:["Syringe driver · per chart · 4-hrly RN check","PRN analgesia (comfort) · RN","Mouth-care gel · 2-hrly"],background:"A registered nurse herself for 38 years. Strong Catholic faith. Son Peter is EPOA; the palliative team is involved. Comfort-focused care, family fully aware.",likes:"Quiet and dim light, hymns played softly, hand-holding, and lavender hand cream. Settles with a familiar voice and gentle company.",canEat:["Smooth pureed meals (IDDSI 4), moulded to look like real food","Pre-thickened drinks (level 150 as charted)","Smooth custard, mousse & jelly","Small comfort tastes — never rushed, always upright"],condDetail:{Palliative:"On a comfort-care pathway with the community palliative team. The goal is dignity and symptom relief, not active treatment. Keep her comfortable, mouth moist, repositioned gently, and involve family in decisions. Call the RN for any distress.","Aspiration risk":"High risk of food/fluid entering the lungs. She MUST be upright at 90° for any intake, fed slowly with 1:1 supervision, and only the charted thickened fluids. Mouth care 2-hourly. Stop and call the RN if she coughs, gurgles or tires."},contacts:["Peter R. · Son / EPOA (primary) · 0423 551 884","Community Palliative Team · 07 5573 2200","Dr Lee · GP · 07 5573 1100"],notes:["Comfort focus, family aware. Mouth care 2-hrly. Upright for any intake."]},{id:"r4",name:"Frank D.",wing:"high",age:"82",room:"H-07",diet:"soft6",falls:2,mobility:"Wheelchair",signIn:"Resident",alerts:["Diabetic","Wound care"],meds:["Insulin (sliding scale) · BSL before meals","Metformin 500mg · with meals","Dressing pack · heel wound"],background:"Ex-interstate truck driver, big personality, loves a yarn. Daughter Mary visits every Sunday with the grandkids. Fiercely independent — let him do what he safely can.",likes:"Sport on the telly, a good chat, and a (soft) meat pie. Likes to wheel himself to the window. Doesn't like being fussed over.",canEat:["Soft & bite-sized (IDDSI 6), cut ≤1.5cm","Tender slow-cooked meat in gravy","Soft cooked vegetables","Soft fruit without skin","Diabetic-friendly soft desserts — watch the sugar"],condDetail:{Diabetic:"Type 2, insulin-managed. Check blood sugar (BSL) before each meal and give insulin on the sliding scale as charted. Watch for hypo signs — shaky, sweaty, confused, pale: give fast sugar and call the RN. Watch for hyper signs — very thirsty, drowsy, frequent urine.","Wound care":"Pressure/skin wound on the right heel. Dressing changed alternate days by the RN. Keep the heel offloaded (pillow under calf, heel floating). Report any odour, increasing redness, swelling or new pain — possible infection."},contacts:["Mary D. · Daughter (primary) · 0412 660 200","Dr Okafor · GP, Benowa · 07 5564 7788"],notes:["BSL before meals. Heel wound dressing alternate days, heel offloaded."]},{id:"r5",name:"Dorothy K.",wing:"assisted",age:"76",room:"A-11",diet:"thin",falls:1,mobility:"Independent",signIn:"Resident",alerts:[],meds:["Cholesterol tablet · evening","Eye drops · twice daily"
